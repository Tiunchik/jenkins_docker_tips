version: '3.8'

services:
  jenkins-master:
    build:
      context: ./jenkins-master
      dockerfile: Dockerfile
    container_name: jenkins-master
    ports:
      - "8080:8080"
      - "50000:50000"
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
      - JENKINS_OPTS=--argumentsRealm.roles.user=admin --argumentsRealm.passwd.admin=admin --argumentsRealm.roles.admin=admin
    volumes:
      - jenkins-master-home:/var/jenkins_home
    networks:
      - jenkins-network
    restart: unless-stopped

  jenkins-worker:
    build:
      context: ./jenkins-worker
      dockerfile: Dockerfile
    container_name: jenkins-worker
    environment:
#      - JENKINS_USER=admin
#      - JENKINS_PASSWORD=admin
      - JENKINS_AGENT_TOKEN=worker-token-12345
      - JENKINS_MASTER_SERVER=jenkins-master:8080
      - JENKINS_AGENT_NAME=worker-1
    volumes:
      - jenkins-worker-home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - jenkins-network
    depends_on:
      - jenkins-master
    restart: unless-stopped

volumes:
  jenkins-master-home:
  jenkins-worker-home:

networks:
  jenkins-network:
    driver: bridge
